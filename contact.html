<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="assets/scss/output.css" rel="stylesheet">
</head>
<body>

    <!-- header -->
    <header id="header">
        
    </header>

    <!-- main -->
    <main class="bg-back items-center flex justify-center">

        <!-- login -->
        <section class="w-full max-w-md px-6 pb-5 pt-30 md:pt-5"> 

            <div class="bg-main p-8 flex flex-col gap-5 rounded-lg shadow-lg">

                <h3 class="text-white text-[32px]">CONTACTEZ NOUS</h3>

                <form action=""></form>

                <input type="text" id="nameContact" placeholder="Votre nom" class="px-4 py-2 md:py-3 bg-white rounded focus:outline-none focus:ring-2 focus:ring-black">

                <input type="email" id="emailContact" placeholder="Votre email" class="px-4 py-2 md:py-3 bg-white rounded focus:outline-none focus:ring-2 focus:ring-black">

                <textarea name="messageContact" id="messageContact" placeholder="Votre message" class="px-4 py-4 h-40 md:h-52 bg-white rounded focus:outline-none focus:ring-2 focus:ring-black resize-none"></textarea>

                <div class="w-full h-px bg-black"></div>

                <a href="confirmationcontact.html" class="bg-back hover:bg-back/80 p-2 flex justify-center"><button>Envoyer votre message</button></a>

            </div>

        </section>

    </main>

    <!-- footer -->
    <footer class="bg-main flex flex-row text-white justify-center gap-15 py-10 border-2 border-main border-t-black" id="footer">

    </footer>

    <!-- link to js -->
    <script src="assets/js/common.js"></script>
    <script src="assets/js/account.js"></script>

</body>
</html>
